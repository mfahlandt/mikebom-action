name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: './scripts'

  actionlint:
    name: Action Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install and run actionlint
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint

  integration-test-path:
    name: "Integration Test: Directory Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone seebom as realistic test target
        run: git clone --depth 1 https://github.com/seebom-labs/seebom.git /tmp/seebom

      - name: Generate SBOM for Go project (seebom backend)
        uses: ./
        id: sbom
        with:
          path: '/tmp/seebom/backend'
          format: 'cyclonedx-json'
          output-file: 'test-sbom.json'
          upload-artifact: 'false'

      - name: Verify SBOM was generated with components
        run: |
          if [[ ! -f "test-sbom.json" ]]; then
            echo "::error::SBOM file not found"
            exit 1
          fi
          echo "SBOM generated at: ${{ steps.sbom.outputs.sbom-path }}"
          COMPONENTS=$(python3 -c "import json; print(len(json.load(open('test-sbom.json'))['components']))")
          echo "Components found: ${COMPONENTS}"
          if [[ "${COMPONENTS}" -lt 1 ]]; then
            echo "::error::No components found in SBOM — expected Go dependencies"
            exit 1
          fi

  integration-test-image:
    name: "Integration Test: Container Image Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate SBOM for container image
        uses: ./
        id: sbom
        with:
          image: 'gcr.io/distroless/static-debian12:latest'
          image-src: 'remote'
          format: 'cyclonedx-json'
          output-file: 'image-sbom.json'
          upload-artifact: 'false'

      - name: Verify SBOM was generated
        run: |
          if [[ ! -f "image-sbom.json" ]]; then
            echo "::error::SBOM file not found"
            exit 1
          fi
          echo "SBOM generated at: ${{ steps.sbom.outputs.sbom-path }}"
          COMPONENTS=$(python3 -c "import json; print(len(json.load(open('image-sbom.json'))['components']))")
          echo "Components found: ${COMPONENTS}"
          if [[ "${COMPONENTS}" -lt 1 ]]; then
            echo "::error::No components found in image SBOM"
            exit 1
          fi



