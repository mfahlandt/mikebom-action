name: SBOM

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  generate-sbom:
    name: Generate project SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate SBOM
        uses: ./
        with:
          path: '.'
          format: 'cyclonedx-json'
          output-file: 'mikebom-action.sbom.cdx.json'
          artifact-name: 'project-sbom'

